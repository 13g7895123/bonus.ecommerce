services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "${DB_PORT:-9209}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ../backend:/var/www/html
    environment:
      CI_ENVIRONMENT: development
      DB_HOSTNAME: db
      DB_DATABASE: ecommerce_db
      DB_USERNAME: ecommerce
      DB_PASSWORD: ecommerce123
    command: >
      /bin/bash -c "
        composer install --no-interaction &&
        echo 'CI_ENVIRONMENT = development' > /var/www/html/.env &&
        echo 'database.default.hostname = db' >> /var/www/html/.env &&
        echo 'database.default.database = ecommerce_db' >> /var/www/html/.env &&
        echo 'database.default.username = ecommerce' >> /var/www/html/.env &&
        echo 'database.default.password = ecommerce123' >> /var/www/html/.env &&
        echo 'database.default.DBDriver = MySQLi' >> /var/www/html/.env &&
        echo 'database.default.port = 3306' >> /var/www/html/.env &&
        echo 'JWT_SECRET = supersecretjwtkey12345678901234567890ab' >> /var/www/html/.env &&
        echo 'JWT_EXPIRE = 86400' >> /var/www/html/.env &&
        php spark migrate --all &&
        php spark db:seed InitialDataSeeder &&
        chown -R www-data:www-data writable &&
        php-fpm
      "
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend-web:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - ../backend:/var/www/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PHPMYADMIN_PORT:-9407}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
