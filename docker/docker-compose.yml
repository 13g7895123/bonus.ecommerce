services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ../backend:/var/www/html
    ports:
      - "${BACKEND_PORT:-8080}:80"
    environment:
      CI_ENVIRONMENT: development
    command: /bin/bash -c "if [ ! -d vendor ]; then composer install; fi && chown -R www-data:www-data /var/www/html && apache2-foreground"
    restart: unless-stopped
