services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Taipei
    ports:
      - "${DB_PORT:-9307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    volumes:
      - ../backend:/var/www/html
    environment:
      TZ: Asia/Taipei
      CI_ENVIRONMENT: development
      DB_HOSTNAME: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-86400}
      SMS_PROVIDER: ${SMS_PROVIDER:-twilio}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      # WebSocket notifier: notify Swoole server after message saved
      WS_INTERNAL_HOST: backend-ws
      WS_INTERNAL_PORT: 9501
    command: >
      /bin/bash -c "
        composer install --no-interaction &&
        echo 'CI_ENVIRONMENT = development' > /var/www/html/.env &&
        echo 'database.default.hostname = db' >> /var/www/html/.env &&
        echo 'database.default.database = ${DB_DATABASE}' >> /var/www/html/.env &&
        echo 'database.default.username = ${DB_USERNAME}' >> /var/www/html/.env &&
        echo 'database.default.password = ${DB_PASSWORD}' >> /var/www/html/.env &&
        echo 'database.default.DBDriver = MySQLi' >> /var/www/html/.env &&
        echo 'database.default.port = 3306' >> /var/www/html/.env &&
        echo 'JWT_SECRET = ${JWT_SECRET}' >> /var/www/html/.env &&
        echo 'JWT_EXPIRE = ${JWT_EXPIRE:-86400}' >> /var/www/html/.env &&
        echo 'SMS_PROVIDER = ${SMS_PROVIDER:-twilio}' >> /var/www/html/.env &&
        echo 'TWILIO_ACCOUNT_SID = ${TWILIO_ACCOUNT_SID}' >> /var/www/html/.env &&
        echo 'TWILIO_AUTH_TOKEN = ${TWILIO_AUTH_TOKEN}' >> /var/www/html/.env &&
        echo 'TWILIO_VERIFY_SERVICE_SID = ${TWILIO_VERIFY_SERVICE_SID}' >> /var/www/html/.env &&
        echo 'FIREBASE_WEB_API_KEY = ${FIREBASE_WEB_API_KEY}' >> /var/www/html/.env &&
        php spark migrate --all &&
        php spark db:seed InitialDataSeeder &&
        chown -R www-data:www-data writable &&
        php-fpm
      "
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backend-web:
    image: nginx:alpine
    ports:
      - "${BACKEND_PORT:-8080}:80"
    volumes:
      - ../backend:/var/www/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - backend

  # Swoole WebSocket server – real-time customer service chat
  backend-ws:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile.swoole
    volumes:
      - ../backend:/var/www/html
    environment:
      TZ: Asia/Taipei
      DB_HOSTNAME: db
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-86400}
    command: >
      /bin/bash -c "
        composer install --no-interaction --quiet &&
        php spark ws:start
      "
    # Expose port to host for vite dev-mode WS proxy (optional in production)
    ports:
      - "${WS_PORT:-9501}:9501"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PHPMYADMIN_PORT:-9407}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
